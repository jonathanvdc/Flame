name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore src/Flame.sln

      - name: Build solution
        run: dotnet build src/Flame.sln -c Debug --no-restore

      - name: Run portable test suite
        run: dotnet src/UnitTests/bin/Debug/net10.0/UnitTests.dll portable

      - name: Run LLVM backend test suites
        run: |
          dotnet publish src/UnitTests/UnitTests.csproj -c Debug -r linux-x64 --self-contained false
          dotnet src/UnitTests/bin/Debug/net10.0/linux-x64/publish/UnitTests.dll 5
          dotnet src/UnitTests/bin/Debug/net10.0/linux-x64/publish/UnitTests.dll 8 --clang-path clang
