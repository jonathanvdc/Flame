name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Mono toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y mono-devel

      - name: Restore dependencies
        run: dotnet restore src/Flame.sln

      - name: Build solution
        run: dotnet build src/Flame.sln -c Debug --no-restore

      - name: Run portable test suite
        run: dotnet src/UnitTests/bin/Debug/net10.0/UnitTests.dll portable
